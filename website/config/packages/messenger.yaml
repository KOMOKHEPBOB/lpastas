framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    queue_name: default

            failed:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    queue_name: failed

            reallocation:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    queue_name: reallocate_order

                retry_strategy:
                    max_retries: 300

        routing:
            App\Message\Cancel\RecalculateOrderAllocationMessage: reallocation

